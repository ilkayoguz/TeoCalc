<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-6 -4 60 46"
     width="600" height="460"
     id="hp-key2-white"
     shape-rendering="geometricPrecision">

  <defs>
    <style>
      .tone-body { fill: #B0ACA4; }
      .tone-top { fill: #FCFAF6; }
      .tone-face { fill: #F4F2EC; }
    </style>
    <!-- Punch top band out of BODY so rounded-cap corners stay alpha-clean for the black well. -->
    <mask id="body-top-vent-mask">
      <rect x="0" y="0" width="48" height="38" fill="white"/>
      <rect id="body-top-vent" x="0" y="0" width="48" height="3.4" fill="black"/>
    </mask>
  </defs>

  <path id="body" class="tone-body" mask="url(#body-top-vent-mask)"
        d="M 0,0
           H 48
           V 33.8
           Q 48,38 44,38
           H 4
           Q 0,38 0,33.8
           Z"/>

  <rect id="top" class="tone-top" x="0" y="0" width="48" height="22.8" rx="2.4" ry="2.4"/>

  <rect id="face" class="tone-face" x="0" y="2.5" width="48" height="22.8" rx="2.4" ry="2.4"/>
</svg>
